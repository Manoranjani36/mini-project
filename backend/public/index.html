<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified Learning Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Light Mode Variables */
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --card-bg: white;
            --text-primary: #333;
            --text-secondary: #4a5568;
            --border-color: #e2e8f0;
            --card-hover-bg: #f7fafc;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --header-bg: white;
            --input-bg: white;
            --quiz-bg: #f7fafc;
        }

        body.dark {
            /* Dark Mode Variables */
            --bg-gradient-start: #1a202c;
            --bg-gradient-end: #2d3748;
            --card-bg: #2d3748;
            --text-primary: #f7fafc;
            --text-secondary: #cbd5e0;
            --border-color: #4a5568;
            --card-hover-bg: #4a5568;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --header-bg: #2d3748;
            --input-bg: #4a5568;
            --quiz-bg: #4a5568;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: var(--header-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #667eea;
            margin: 0;
        }

        body.dark h1 {
            color: #9f7aea;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .mode-toggle,
        .lang-toggle {
            background: #4299e1;
            color: white;
        }

        .section {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            display: none;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--text-secondary);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .subject-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .lesson-item {
            background: var(--quiz-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card {
            background: var(--quiz-bg);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: #fbbf24;
            color: #92400e;
            border-radius: 20px;
            font-size: 12px;
            margin: 5px;
        }

        .quiz-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .quiz-content {
            max-width: 800px;
            margin: 50px auto;
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            color: var(--text-primary);
        }

        .quiz-question {
            margin-bottom: 20px;
            padding: 15px;
            background: var(--quiz-bg);
            border-radius: 5px;
        }

        .quiz-options {
            margin-top: 10px;
            margin-left: 20px;
        }

        .quiz-options label {
            display: block;
            margin: 10px 0;
            font-weight: normal;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .offline-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #f56565;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
            display: none;
        }

        .offline-badge.show {
            display: block;
        }

        .teacher-subject-info {
            background: #e6f7ff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            color: #0050b3;
        }

        body.dark .teacher-subject-info {
            background: #1e3a5f;
            color: #b3e0ff;
        }

        @media (max-width: 768px) {
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .controls {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

    <div class="container">
        <div class="header">
            <h1 id="appTitle">🎮 Gamified Learning Platform</h1>
            <div class="controls">

                    <option value="ta">தமிழ் (Tamil)</option>
                    <option value="hi">हिन्दी (Hindi)</option>

                <button onclick="showRoleSelection('student')" class="btn-primary" id="studentBtn">👨‍🎓

                <button onclick="showRoleSelection('teacher')" class="btn-primary" id="teacherBtn">👨‍🏫
                    Teacher</button>
            </div>
        </div>

        <!-- Student Registration -->

            </div>
            <div class="form-group">
                <label id="gradeLabel">Grade:</label>
                <select id="studentGrade">

                    <option value="2">Grade 2</option>
                    <option value="3">Grade 3</option>
                    <option value="4">Grade 4</option>
                    <option value="5">Grade 5</option>
                    <option value="6">Grade 6</option>
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                </select>
            </div>
            <button onclick="registerStudent()" class="btn-primary" id="startLearningBtn">Start Learning</button>
            <button onclick="showRoleSelection()" class="btn-secondary" id="backBtn">Back</button>
        </div>

        <!-- Student Dashboard -->
        <div id="studentDashboard" class="section">
            <div id="studentInfo"></div>
            <div class="grid-3" id="subjectsContainer"></div>
            <div id="lessonsContainer" style="margin-top: 20px;"></div>
            <div id="homeworkContainer" style="margin-top: 20px;"></div>
            <div id="rewardsContainer" style="margin-top: 20px;"></div>
            <button onclick="logout()" class="btn-danger" id="logoutBtn">Logout</button>
        </div>

        <!-- Teacher Registration -->
        <div id="teacherRegistration" class="section">
            <h2 id="teacherRegTitle">👨‍🏫 Teacher Registration</h2>
            <div class="form-group">
                <label id="teacherNameLabel">Your Name:</label>
                <input type="text" id="teacherName" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label id="teacherGradeLabel">Grade:</label>
                <select id="teacherGrade">
                    <option value="1">Grade 1</option>
                    <option value="2">Grade 2</option>
                    <option value="3">Grade 3</option>
                    <option value="4">Grade 4</option>
                    <option value="5">Grade 5</option>
                    <option value="6">Grade 6</option>
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                </select>
            </div>
            <div class="form-group">
                <label id="subjectLabel">Handled Subject:</label>
                <select id="teacherSubject">
                    <option value="Mathematics">Mathematics</option>
                    <option value="Science">Science</option>
                    <option value="Social Sciences">Social Sciences</option>
                </select>
            </div>
            <button onclick="registerTeacher()" class="btn-primary" id="startTeachingBtn">Start Teaching</button>
            <button onclick="showRoleSelection()" class="btn-secondary" id="backBtn2">Back</button>
        </div>

        <!-- Teacher Dashboard -->
        <div id="teacherDashboard" class="section">
            <div id="teacherInfo"></div>
            <h3>📄 Upload Quiz PDF</h3>

            <input type="file" id="pdfFile" accept="application/pdf">

            <br><br>

            <select id="uploadSubject">
                <option value="Mathematics">Mathematics</option>
                <option value="Science">Science</option>
                <option value="Social Sciences">Social Sciences</option>
            </select>

            <input type="text" id="uploadLesson" placeholder="Enter Lesson Name">

            <br><br>

            <button onclick="uploadQuizPDF()" class="btn-primary">
                Upload & Generate Quiz
            </button>

            <hr>
            <!-- Subject Filter Info -->
            <div id="teacherSubjectInfo" class="teacher-subject-info">
                <strong>📊 Subject Filter:</strong> You are viewing progress only for <strong
                    id="teacherSubjectDisplay"></strong> subject
            </div>

            <h3 id="studentProgressTitle">📊 Student Progress</h3>
            <canvas id="progressChart" class="progress-chart"></canvas>
            <div id="studentsProgressList"></div>

            <h3 id="assignHomeworkTitle">📝 Assign Homework</h3>
            <div class="form-group">
                <label id="selectStudentLabel">Select Student:</label>
                <select id="homeworkStudent"></select>
            </div>
            <div class="form-group">
                <label id="homeworkSubjectLabel">Subject:</label>
                <input type="text" id="homeworkSubject" placeholder="Subject">
            </div>
            <div class="form-group">
                <label id="homeworkLessonLabel">Lesson:</label>
                <input type="text" id="homeworkLesson" placeholder="Lesson">
            </div>
            <div class="form-group">
                <label id="homeworkDetailsLabel">Homework Details:</label>
                <textarea id="homeworkContent" placeholder="Enter homework details..."></textarea>
            </div>
            <div class="form-group">
                <label id="dueDateLabel">Due Date:</label>
                <input type="date" id="homeworkDueDate">
            </div>
            <button onclick="assignHomework()" class="btn-primary" id="assignBtn">Assign Homework</button>

            <button onclick="logout()" class="btn-danger" style="margin-top: 20px;" id="logoutBtn2">Logout</button>
        </div>

        <!-- Quiz Modal -->
        <div id="quizModal" class="quiz-modal">
            <div class="quiz-content">
                <h2 id="takeQuizTitle">📝 Take Quiz</h2>
                <div id="quizQuestions"></div>
                <button onclick="submitQuiz()" class="btn-primary" id="submitQuizBtn">Submit</button>
                <button onclick="closeQuiz()" class="btn-danger" id="cancelQuizBtn">Cancel</button>
            </div>
        </div>
    </div>

        function changeLanguage() {
            currentLanguage = document.getElementById("languageSelect").value;
            applyTranslations();
            localStorage.setItem("language", currentLanguage);
            if (currentStudent) loadStudentDashboard();
            else if (currentTeacher) loadTeacherDashboard();
        }

        // Toggle Light/Dark Mode
        function toggleMode() {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("darkMode", isDark);
            const modeToggle = document.getElementById("modeToggle");
            modeToggle.innerHTML = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
        }

        // Check and apply saved preferences
        function loadPreferences() {
            const savedMode = localStorage.getItem("darkMode");
            if (savedMode === "true") {
                document.body.classList.add("dark");
                document.getElementById("modeToggle").innerHTML = "☀️ Light Mode";
            }

            const savedLang = localStorage.getItem("language");
            if (savedLang) {
                currentLanguage = savedLang;
                document.getElementById("languageSelect").value = savedLang;
                applyTranslations();
            }
        }

        // Offline Mode Detection
        function checkOfflineStatus() {
            isOffline = !navigator.onLine;
            const badge = document.getElementById("offlineBadge");
            if (isOffline) {
                badge.classList.add("show");
                console.log("📡 Offline mode active - using cached data");
            } else {
                badge.classList.remove("show");
            }
        }

        // Save data to localStorage for offline mode
        function saveToLocalStorage(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function getFromLocalStorage(key) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : null;
        }

        // Show role selection
        function showRoleSelection(role) {
            document.getElementById("studentRegistration").classList.remove("active");
            document.getElementById("teacherRegistration").classList.remove("active");
            document.getElementById("studentDashboard").classList.remove("active");
            document.getElementById("teacherDashboard").classList.remove("active");

            if (role === 'student') {
                document.getElementById("studentRegistration").classList.add("active");
            } else if (role === 'teacher') {
                document.getElementById("teacherRegistration").classList.add("active");
            } else {
                document.getElementById("studentRegistration").classList.add("active");
            }
        }

        // Register student with offline support
        async function registerStudent() {
            const name = document.getElementById("studentName").value;
            const grade = document.getElementById("studentGrade").value;

            if (!name || !grade) {
                alert("Please enter your name and select grade");
                return;
            }

            const studentData = { name, grade: parseInt(grade) };

            try {
                let response;
                if (!isOffline) {
                    response = await fetch(`${API}/api/student/register`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(studentData)
                    });
                    const data = await response.json();
                    if (data.success) {
                        currentStudent = data.student;
                        saveToLocalStorage("currentStudent", currentStudent);
                        localStorage.setItem("studentId", currentStudent.id);
                        loadStudentDashboard();
                    } else {
                        alert(translations[currentLanguage].errorRegister + ": " + data.error);
                    }
                } else {
                    currentStudent = {
                        id: Date.now(),
                        ...studentData,
                        levels: { "Mathematics": {}, "Science": {}, "Social Sciences": {} },
                        rewards: [],
                        badges: [],
                        homework: [],
                        quizScores: {},
                        createdAt: new Date().toISOString()
                    };
                    saveToLocalStorage("currentStudent", currentStudent);
                    localStorage.setItem("studentId", currentStudent.id);
                    loadStudentDashboard();
                    alert("📡 Offline mode: Student registered locally");
                }
            } catch (error) {
                console.error("Registration error:", error);
                currentStudent = {
                    id: Date.now(),
                    ...studentData,
                    levels: { "Mathematics": {}, "Science": {}, "Social Sciences": {} },
                    rewards: [],
                    badges: [],
                    homework: [],
                    quizScores: {},
                    createdAt: new Date().toISOString()
                };
                saveToLocalStorage("currentStudent", currentStudent);
                localStorage.setItem("studentId", currentStudent.id);
                loadStudentDashboard();
                alert("📡 Offline mode: Student registered locally");
            }
        }

        // Load student dashboard with offline support
        async function loadStudentDashboard() {
            const studentId = localStorage.getItem("studentId");
            if (!studentId) return;

            try {
                if (!isOffline) {
                    const response = await fetch(`${API}/api/student/${studentId}`);
                    currentStudent = await response.json();
                    saveToLocalStorage("currentStudent", currentStudent);
                } else {
                    currentStudent = getFromLocalStorage("currentStudent");
                    if (!currentStudent) {
                        alert("No student data available offline");
                        return;
                    }
                }

                document.getElementById("studentRegistration").classList.remove("active");
                document.getElementById("studentDashboard").classList.add("active");

                const t = translations[currentLanguage];
                document.getElementById("studentInfo").innerHTML = `
                    <h2>${t.welcome}, ${currentStudent.name}! 🎓</h2>
                    <p>${t.grade}: ${currentStudent.grade} | ${t.totalBadges}: ${currentStudent.badges.length} | ${t.totalRewards}: ${currentStudent.rewards.length}</p>
                `;

                const subjectsContainer = document.getElementById("subjectsContainer");
                subjectsContainer.innerHTML = "";
                const subjects = ["Mathematics", "Science", "Social Sciences"];
                subjects.forEach(subject => {
                    subjectsContainer.innerHTML += `
                        <div class="subject-card" onclick="showLessons('${subject}')">
                            <h3>${subject}</h3>
                            <p>${t.clickToView}</p>
                        </div>
                    `;
                });

                displayHomework();
                displayRewards();

            } catch (error) {
                console.error("Error loading dashboard:", error);
                currentStudent = getFromLocalStorage("currentStudent");
                if (currentStudent) {
                    document.getElementById("studentRegistration").classList.remove("active");
                    document.getElementById("studentDashboard").classList.add("active");
                    displayHomework();
                    displayRewards();
                }
            }
        }

        // Show lessons for a subject with offline support
        async function showLessons(subject) {
            try {
                let lessons;
                if (!isOffline) {
                    const response = await fetch(`${API}/api/lessons`);
                    lessons = await response.json();
                    saveToLocalStorage("lessons", lessons);
                } else {
                    lessons = getFromLocalStorage("lessons");
                    if (!lessons) {
                        alert("No lesson data available offline. Please connect to internet first.");
                        return;
                    }
                }

                const lessonsContainer = document.getElementById("lessonsContainer");
                const t = translations[currentLanguage];
                lessonsContainer.innerHTML = `<h3>📚 ${subject} ${t.lessons}</h3>`;

                if (lessons[subject]) {
                    for (let lesson in lessons[subject]) {
                        const completed = currentStudent.levels[subject] && currentStudent.levels[subject][lesson] && currentStudent.levels[subject][lesson].completed;
                        const score = currentStudent.levels[subject] && currentStudent.levels[subject][lesson] ? currentStudent.levels[subject][lesson].score : 0;
                        const stars = currentStudent.levels[subject] && currentStudent.levels[subject][lesson] ? currentStudent.levels[subject][lesson].stars : 0;

                        lessonsContainer.innerHTML += `
                            <div class="lesson-item">
                                <div>
                                    <strong>${lesson}</strong>
                                    ${completed ? `<p>${t.score}: ${score}% | ${'⭐'.repeat(stars)}</p>` : `<p>${t.notCompleted}</p>`}
                                </div>
                                <button onclick="takeQuiz('${subject}', '${lesson}')" class="btn-secondary">${t.takeQuiz}</button>
                            </div>
                        `;
                    }
                } else {
                    lessonsContainer.innerHTML += `<p>${t.noLessons}</p>`;
                }

                lessonsContainer.scrollIntoView({ behavior: "smooth" });
            } catch (error) {
                console.error("Error loading lessons:", error);
            }
        }

        // Take quiz with offline support
        async function takeQuiz(subject, lesson) {
            try {
                let quiz;
                if (!isOffline) {
                    const response = await fetch(`${API}/api/lesson/${subject}/${lesson}/quiz`);
                    const data = await response.json();
                    quiz = data.quiz;
                    saveToLocalStorage(`quiz_${subject}_${lesson}`, quiz);
                } else {
                    quiz = getFromLocalStorage(`quiz_${subject}_${lesson}`);
                    if (!quiz) {
                        alert("No quiz data available offline. Please connect to internet first.");
                        return;
                    }
                }

                if (quiz && quiz.length > 0) {
                    currentQuiz = quiz;
                    currentSubject = subject;
                    currentLesson = lesson;

                    const quizHTML = currentQuiz.map((q, index) => `
                        <div class="quiz-question">
                            <p><strong>${index + 1}. ${q.question}</strong></p>
                            <div class="quiz-options">
                                ${q.options.map((opt, optIndex) => `
                                    <label>
                                        <input type="radio" name="q${index}" value="${opt}">
                                        ${opt}
                                    </label><br>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');

                    document.getElementById("quizQuestions").innerHTML = quizHTML;
                    document.getElementById("quizModal").style.display = "block";
                } else {
                    alert("No quiz available for this lesson");
                }
            } catch (error) {
                console.error("Error loading quiz:", error);
                alert("Error loading quiz");
            }
        }

        // Submit quiz with offline support
        async function submitQuiz() {
            let correctCount = 0;

            currentQuiz.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && selected.value === q.answer) {
                    correctCount++;
                }
            });

            const score = (correctCount / currentQuiz.length) * 100;
            const t = translations[currentLanguage];

            try {
                if (!isOffline) {
                    const response = await fetch(`${API}/api/student/quiz-score`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            studentId: currentStudent.id,
                            subject: currentSubject,
                            lesson: currentLesson,
                            score: score,
                            quizAnswers: []
                        })
                    });
                    const data = await response.json();
                    alert(`${t.quizCompleted}: ${score}% (${data.stars} ${t.stars})`);
                } else {
                    const stars = Math.round((score / 100) * 5);
                    if (!currentStudent.levels[currentSubject]) {
                        currentStudent.levels[currentSubject] = {};
                    }
                    currentStudent.levels[currentSubject][currentLesson] = {
                        completed: true,
                        score,
                        stars,
                        completedAt: new Date().toISOString()
                    };
                    if (stars === 5) {
                        const badge = `${currentLesson} Star Performer`;
                        if (!currentStudent.badges.includes(badge)) {
                            currentStudent.badges.push(badge);
                        }
                    }
                    currentStudent.rewards.push({
                        id: Date.now(),
                        subject: currentSubject,
                        lesson: currentLesson,
                        stars,
                        score,
                        earnedAt: new Date().toISOString()
                    });
                    saveToLocalStorage("currentStudent", currentStudent);
                    alert(`📡 ${t.quizCompleted}: ${score}% (${stars} ${t.stars}) [Offline Mode]`);
                }
                closeQuiz();
                loadStudentDashboard();
            } catch (error) {
                console.error("Error submitting quiz:", error);
                alert("Error submitting quiz");
            }
        }

        // Display homework with translations
        function displayHomework() {
            const homeworkContainer = document.getElementById("homeworkContainer");
            const t = translations[currentLanguage];

            if (currentStudent.homework && currentStudent.homework.length > 0) {
                homeworkContainer.innerHTML = `<h3>📝 ${t.homework}</h3>`;
                currentStudent.homework.forEach(hw => {
                    homeworkContainer.innerHTML += `
                        <div class="card">
                            <strong>${t.from}: ${hw.from}</strong><br>
                            <strong>Subject: ${hw.subject}</strong><br>
                            <strong>Lesson: ${hw.lesson}</strong><br>
                            <p>${hw.content}</p>
                            <p>${t.due}: ${new Date(hw.dueDate).toLocaleDateString()}</p>
                            ${!hw.completed ? `
                                <button onclick="completeHomework(${hw.id})" class="btn-secondary">${t.markComplete}</button>
                            ` : `<span class="badge">✅ ${t.completed}</span>`}
                        </div>
                    `;
                });
            } else {
                homeworkContainer.innerHTML = `<h3>📝 ${t.homework}</h3><p>${t.noHomework}</p>`;
            }
        }

        // Complete homework with offline support
        async function completeHomework(homeworkId) {
            try {
                if (!isOffline) {
                    await fetch(`${API}/api/student/submit-homework`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            studentId: currentStudent.id,
                            homeworkId: homeworkId,
                            submission: "Completed"
                        })
                    });
                } else {
                    const homeworkIndex = currentStudent.homework.findIndex(h => h.id == homeworkId);
                    if (homeworkIndex !== -1) {
                        currentStudent.homework[homeworkIndex].completed = true;
                        currentStudent.homework[homeworkIndex].submittedAt = new Date().toISOString();
                        saveToLocalStorage("currentStudent", currentStudent);
                    }
                }
                loadStudentDashboard();
            } catch (error) {
                console.error("Error completing homework:", error);
                alert("Error completing homework");
            }
        }

        // Display rewards with translations
        function displayRewards() {
            const rewardsContainer = document.getElementById("rewardsContainer");
            const t = translations[currentLanguage];
            let rewardsHTML = "";

            if (currentStudent.badges && currentStudent.badges.length > 0) {
                rewardsHTML += `<h3>${t.badgesEarned}</h3><div>`;
                currentStudent.badges.forEach(badge => {
                    rewardsHTML += `<span class="badge">🏅 ${badge}</span>`;
                });
                rewardsHTML += "</div>";
            }

            if (currentStudent.rewards && currentStudent.rewards.length > 0) {
                rewardsHTML += `<h3>${t.recentRewards}</h3><div>`;
                currentStudent.rewards.slice(-5).forEach(reward => {
                    rewardsHTML += `<span class="badge reward">⭐ ${reward.subject}: ${reward.lesson} - ${reward.stars} ${t.stars}</span>`;
                });
                rewardsHTML += "</div>";
            }

            rewardsContainer.innerHTML = rewardsHTML || `<h3>🏆 ${t.badgesEarned}</h3><p>${t.completeQuizzes}</p>`;
        }

        // Register teacher
        async function registerTeacher() {
            const name = document.getElementById("teacherName").value;
            const grade = document.getElementById("teacherGrade").value;
            const subject = document.getElementById("teacherSubject").value;

            if (!name || !grade || !subject) {
                alert("Please fill all fields");
                return;
            }

            try {
                const response = await fetch(`${API}/api/teacher/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, grade: parseInt(grade), subject })
                });

                const data = await response.json();
                if (data.success) {
                    currentTeacher = data.teacher;
                    localStorage.setItem("teacherId", currentTeacher.id);
                    loadTeacherDashboard();
                } else {
                    alert("Registration failed: " + data.error);
                }
            } catch (error) {
                console.error("Registration error:", error);
                alert("Error registering teacher");
            }
        }

        // Load teacher dashboard
        async function loadTeacherDashboard() {
            const teacherId = localStorage.getItem("teacherId");
            if (!teacherId) return;

            try {
                const response = await fetch(`${API}/api/teacher/${teacherId}`);
                currentTeacher = await response.json();

                document.getElementById("teacherRegistration").classList.remove("active");
                document.getElementById("teacherDashboard").classList.add("active");

                const t = translations[currentLanguage];
                document.getElementById("teacherInfo").innerHTML = `
                    <h2>${t.welcome}, Teacher ${currentTeacher.name}! 👨‍🏫</h2>
                    <p>${t.grade}: ${currentTeacher.grade} | Subject: ${currentTeacher.subject}</p>
                `;

                // Display subject filter info
                const subjectDisplay = document.getElementById("teacherSubjectDisplay");
                if (subjectDisplay) {
                    subjectDisplay.innerText = currentTeacher.subject;
                }

                // Load student list for homework assignment
                const studentsResponse = await fetch(`${API}/api/students`);
                const allStudents = await studentsResponse.json();
                const studentSelect = document.getElementById("homeworkStudent");
                studentSelect.innerHTML = '<option value="">Select Student</option>';

                allStudents.forEach(student => {
                    studentSelect.innerHTML += `<option value="${student.id}">${student.name} (Grade ${student.grade})</option>`;
                });

                // Load student progress chart (filtered by teacher's subject)
                loadStudentProgress();

            } catch (error) {
                console.error("Error loading teacher dashboard:", error);
            }
        }

        // Load student progress for chart
        async function loadStudentProgress() {
            try {
                const response = await fetch(`${API}/api/teacher/${currentTeacher.id}/students-progress`);
                const studentsProgress = await response.json();

                if (studentsProgress.length > 0) {
                    const allLessons = new Set();
                    studentsProgress.forEach(student => {
                        for (let subject in student.progress) {
                            for (let lesson in student.progress[subject]) {
                                allLessons.add(`${subject}: ${lesson}`);
                            }
                        }
                    });

                    const datasets = studentsProgress.map(student => {
                        const scores = Array.from(allLessons).map(lesson => {
                            const [subject, lessonName] = lesson.split(': ');
                            return student.progress[subject]?.[lessonName] || 0;
                        });
                        return {
                            label: student.name,
                            data: scores,
                            borderColor: `hsl(${Math.random() * 360}, 70%, 50%)`,
                            fill: false,
                            tension: 0.4
                        };
                    });

                    if (progressChart) progressChart.destroy();

                    const ctx = document.getElementById('progressChart').getContext('2d');
                    progressChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: Array.from(allLessons),
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            scales: {
                                y: { beginAtZero: true, max: 100, title: { display: true, text: 'Score (%)' } },
                                x: { title: { display: true, text: 'Lessons' } }
                            }
                        }
                    });

                    const progressList = document.getElementById("studentsProgressList");
                    progressList.innerHTML = "<h4>Student Performance Summary</h4>";
                    studentsProgress.forEach(student => {
                        let total = 0, count = 0;
                        for (let subject in student.progress) {
                            for (let lesson in student.progress[subject]) {
                                total += student.progress[subject][lesson];
                                count++;
                            }
                        }
                        const avg = count > 0 ? (total / count).toFixed(1) : 0;
                        progressList.innerHTML += `
                            <div class="card">
                                <strong>${student.name}</strong> (Grade ${student.grade})<br>
                                Average Score: ${avg}% | Completed Lessons: ${count}
                            </div>
                        `;
                    });
                } else {
                    document.getElementById("studentsProgressList").innerHTML = "<p>No student progress data available for your subject yet.</p>";
                }
            } catch (error) {
                console.error("Error loading student progress:", error);
            }
        }

        // Assign homework
        async function assignHomework() {
            const studentId = document.getElementById("homeworkStudent").value;
            const subject = document.getElementById("homeworkSubject").value;
            const lesson = document.getElementById("homeworkLesson").value;
            const homework = document.getElementById("homeworkContent").value;
            const dueDate = document.getElementById("homeworkDueDate").value;

            if (!studentId || !homework) {
                alert("Please select a student and enter homework details");
                return;
            }

            try {
                const response = await fetch(`${API}/api/teacher/assign-homework`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        teacherId: currentTeacher.id,
                        studentId: parseInt(studentId),
                        homework,
                        subject: subject || currentTeacher.subject,
                        lesson: lesson || "General",
                        dueDate: dueDate || new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]
                    })
                });

                const data = await response.json();
                alert(data.message);

                document.getElementById("homeworkSubject").value = "";
                document.getElementById("homeworkLesson").value = "";
                document.getElementById("homeworkContent").value = "";
                document.getElementById("homeworkDueDate").value = "";

            } catch (error) {
                console.error("Error assigning homework:", error);
                alert("Error assigning homework");
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem("studentId");
            localStorage.removeItem("teacherId");
            currentStudent = null;
            currentTeacher = null;
            location.reload();
        }

        // Close quiz modal
        function closeQuiz() {
            document.getElementById("quizModal").style.display = "none";
        }
        // 🔽 ADD THIS FUNCTION HERE (before window.onload)

        async function uploadQuizPDF() {
            const file = document.getElementById("pdfFile").files[0];
            const subject = document.getElementById("uploadSubject").value;
            const lesson = document.getElementById("uploadLesson").value;

            if (!file) {
                alert("Please select a PDF file");
                return;
            }

            if (!lesson) {
                alert("Enter lesson name");
                return;
            }

            const formData = new FormData();
            formData.append("pdf", file);
            formData.append("subject", subject);
            formData.append("lesson", lesson);

            try {
                alert("Uploading PDF & generating quiz... ⏳");

                const res = await fetch(`${API}/api/teacher/upload-quiz-pdf`, {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                alert(data.message);

            } catch (error) {
                console.error(error);
                alert("Error uploading PDF");
            }
        }
        // Initialize
        window.onload = () => {
            loadPreferences();
            checkOfflineStatus();
            window.addEventListener('online', () => { isOffline = false; checkOfflineStatus(); });
            window.addEventListener('offline', () => { isOffline = true; checkOfflineStatus(); });

            const studentId = localStorage.getItem("studentId");
            const teacherId = localStorage.getItem("teacherId");

            if (studentId) {
                loadStudentDashboard();
            } else if (teacherId) {
                loadTeacherDashboard();
            } else {
                showRoleSelection();
            }
        };
